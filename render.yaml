services:
  - type: web
    name: ai-shield-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: MONGO_DB_NAME
        value: ai_detection_db
    rootDir: backend
    pythonVersion: "3.11"
